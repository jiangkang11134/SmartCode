<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCode</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace; height: 100vh; display: flex; background: #0d1117; color: #c9d1d9; }

  /* 左侧：文件浏览器 */
  .file-panel { width: 240px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
  .file-header { padding: 10px 12px; font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #30363d; }
  .file-list { flex: 1; overflow-y: auto; padding: 4px; font-size: 13px; }
  .file-item { padding: 5px 10px; cursor: pointer; border-radius: 4px; margin: 1px 4px; display: flex; align-items: center; gap: 6px; }
  .file-item:hover { background: #1c2333; }
  .file-item.selected { background: #1f6feb22; color: #58a6ff; }
  .file-item .icon { width: 16px; text-align: center; }
  .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .size { font-size: 11px; color: #484f58; }

  /* 中间：终端 */
  .main { flex: 1; display: flex; flex-direction: column; background: #0d1117; }
  .terminal { flex: 1; overflow-y: auto; padding: 12px; font-size: 14px; line-height: 1.5; }
  .terminal .line { white-space: pre-wrap; word-break: break-all; }
  .terminal .line.user { color: #7ee787; }
  .terminal .line.assistant { color: #c9d1d9; }
  .terminal .line.system { color: #8b949e; font-size: 12px; }
  .terminal .line.error { color: #f85149; }
  .terminal .line.tool { color: #d2a8ff; font-size: 12px; }
  .terminal .line.file { color: #58a6ff; font-size: 12px; }
  .terminal .line.prompt { color: #7ee787; }
  .terminal .line.prompt .cursor { background: #7ee787; color: #0d1117; animation: blink 1s step-end infinite; padding: 0 2px; }
  @keyframes blink { 50% { opacity: 0; } }

  .input-line { display: flex; align-items: center; padding: 8px 12px; border-top: 1px solid #30363d; background: #161b22; }
  .input-line .prompt { color: #7ee787; margin-right: 8px; font-size: 14px; white-space: nowrap; }
  .input-line input { flex: 1; background: transparent; border: none; color: #c9d1d9; font-size: 14px; font-family: inherit; outline: none; }
  .input-line input::placeholder { color: #484f58; }

  /* 右侧：预览 + 设置 */
  .right-panel { width: 320px; background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; }
  .settings { padding: 12px; border-bottom: 1px solid #30363d; }
  .settings label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 4px; }
  .settings input, .settings select { width: 100%; background: #0d1117; color: #c9d1d9; border: 1px solid #30363d; padding: 6px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 8px; font-family: inherit; }
  .settings input:focus, .settings select:focus { outline: none; border-color: #58a6ff; }

  .preview { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
  .preview-header { padding: 8px 12px; font-size: 11px; color: #8b949e; border-bottom: 1px solid #30363d; text-transform: uppercase; letter-spacing: 0.5px; }
  .preview-content { flex: 1; overflow: auto; padding: 12px; }
  .preview-content pre { margin: 0; font-size: 13px; line-height: 1.5; color: #c9d1d9; white-space: pre-wrap; }

  .drop-zone { border: 1px dashed #30363d; border-radius: 4px; padding: 12px; text-align: center; font-size: 12px; color: #484f58; cursor: pointer; margin: 8px; transition: all 0.2s; }
  .drop-zone:hover { border-color: #58a6ff; color: #58a6ff; }
  .drop-zone.dragover { border-color: #58a6ff; background: #1c2333; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<!-- 文件浏览器 -->
<div class="file-panel">
  <div class="file-header">📁 项目文件</div>
  <div class="file-list" id="fileList"></div>
  <div class="drop-zone" id="dropZone">📂 拖拽文件到此处上传到项目根目录</div>
</div>

<!-- 终端 -->
<div class="main">
  <div class="terminal" id="terminal"></div>
  <div class="input-line">
    <span class="prompt">$</span>
    <input id="cmdInput" placeholder="输入命令或编码需求，按 Enter 发送..." autofocus>
  </div>
</div>

<!-- 右侧 -->
<div class="right-panel">
  <div class="settings">
    <label>模型</label>
    <input id="modelInput" value="deepseek-v4-flash">
    <label>API Base URL</label>
    <input id="baseUrlInput" value="https://dashscope.aliyuncs.com/compatible-mode/v1">
    <label>API Key</label>
    <input id="apiKeyInput" type="password" value="">
    <label>审查模式</label>
    <select id="modeSelect">
      <option value="off">off — 不审查</option>
      <option value="loose">loose — 宽松审查</option>
      <option value="strict" selected>strict — 严格审查</option>
    </select>
  </div>
  <div class="preview">
    <div class="preview-header">📄 预览</div>
    <div class="preview-content" id="previewContent">
      <pre style="color:#484f58">选择文件查看内容</pre>
    </div>
  </div>
</div>

<script>
let currentPath = ".";

// ── 文件浏览器 ──

async function loadFiles(path) {
  currentPath = path;
  const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
  const data = await res.json();
  if (data.error) return;
  const list = document.getElementById("fileList");
  list.innerHTML = "";
  if (data.parent) {
    const el = document.createElement("div");
    el.className = "file-item";
    el.innerHTML = '<span class="icon">📁</span><span class="name">..</span>';
    el.onclick = () => loadFiles(data.parent);
    list.appendChild(el);
  }
  for (const item of data.items) {
    const el = document.createElement("div");
    el.className = "file-item";
    const icon = item.type === "dir" ? "📁" : "📄";
    el.innerHTML = `<span class="icon">${icon}</span><span class="name">${item.name}</span>`;
    if (item.type === "dir") {
      el.onclick = () => loadFiles(item.path);
    } else if (item.name.endsWith(".py") || item.name.endsWith(".md") || item.name.endsWith(".txt") || item.name.endsWith(".json")) {
      el.onclick = () => previewFile(item.path);
    }
    list.appendChild(el);
  }
}

async function previewFile(path) {
  const res = await fetch(`/api/file?path=${encodeURIComponent(path)}`);
  const data = await res.json();
  if (data.error) return;
  document.getElementById("previewContent").innerHTML = `<pre>${escapeHtml(data.content)}</pre>`;
  document.querySelectorAll(".file-item").forEach(e => e.classList.remove("selected"));
  event?.target?.closest?.(".file-item")?.classList?.add("selected");
}

// ── 拖拽上传 ──
const dropZone = document.getElementById("dropZone");
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add("dragover"); };
dropZone.ondragleave = () => dropZone.classList.remove("dragover");
dropZone.ondrop = async (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  const files = e.dataTransfer.files;
  for (const file of files) {
    const formData = new FormData();
    formData.append("file", file);
    await fetch("/api/upload", { method: "POST", body: formData });
  }
  loadFiles(".");
};

// ── 终端 ──
const term = document.getElementById("terminal");
const cmdInput = document.getElementById("cmdInput");
const modelInput = document.getElementById("modelInput");
const baseUrlInput = document.getElementById("baseUrlInput");
const apiKeyInput = document.getElementById("apiKeyInput");
const modeSelect = document.getElementById("modeSelect");
let buffer = "";

function termLine(text, cls = "") {
  const div = document.createElement("div");
  div.className = `line ${cls}`;
  div.textContent = text;
  term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function termHTML(html) {
  const div = document.createElement("div");
  div.className = "line";
  div.innerHTML = html;
  term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function escapeHtml(t) {
  return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

cmdInput.addEventListener("keydown", async (e) => {
  if (e.key !== "Enter" || !cmdInput.value.trim()) return;
  const text = cmdInput.value;
  cmdInput.value = "";
  cmdInput.disabled = true;

  // 显示用户输入
  termLine(`$ ${text}`, "user");

  // 检查是否为系统命令
  if (text.startsWith("/")) {
    const parts = text.slice(1).split(" ");
    switch (parts[0]) {
      case "clear": term.innerHTML = ""; cmdInput.disabled = false; cmdInput.focus(); return;
      case "ls": loadFiles(parts[1] || "."); cmdInput.disabled = false; cmdInput.focus(); return;
      case "model":
        if (parts[1]) { modelInput.value = parts[1]; termLine(`切换到模型: ${parts[1]}`, "system"); }
        else termLine(`当前模型: ${modelInput.value}`, "system");
        cmdInput.disabled = false; cmdInput.focus(); return;
      case "mode":
        if (parts[1] && ["off","loose","strict"].includes(parts[1])) {
          modeSelect.value = parts[1];
          termLine(`审查模式: ${parts[1]}`, "system");
        } else termLine(`当前审查模式: ${modeSelect.value}`, "system");
        cmdInput.disabled = false; cmdInput.focus(); return;
      case "help":
        termLine("/clear — 清屏", "system");
        termLine("/ls [path] — 列出目录", "system");
        termLine("/model [name] — 查看/切换模型", "system");
        termLine("/mode [off|loose|strict] — 切换审查模式", "system");
        termLine("/report — 运行报告", "system");
        termLine("/help — 本帮助", "system");
        cmdInput.disabled = false; cmdInput.focus(); return;
    }
  }

  // ── WebSocket 请求 ──
  const ws = new WebSocket(`ws://${location.host}/ws/chat`);
  ws.onopen = () => {
    ws.send(JSON.stringify({
      message: text,
      mode: modeSelect.value,
      model: modelInput.value,
      api_key: apiKeyInput.value,
      base_url: baseUrlInput.value,
    }));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === "result") {
      termLine(data.content || "(无回复)", "assistant");
      if (data.files && data.files.length > 0) {
        termLine(`📄 ${data.files.join(", ")}`, "file");
        loadFiles(".");
      }
    } else if (data.type === "status") {
      termLine(`▸ ${data.content}`, "system");
    } else if (data.type === "error") {
      termLine(`✗ ${data.content}`, "error");
    }
  };

  ws.onclose = () => { cmdInput.disabled = false; cmdInput.focus(); };
  ws.onerror = () => { termLine("✗ 连接失败", "error"); cmdInput.disabled = false; };
});

loadFiles(".");
</script>
</body>
</html>
